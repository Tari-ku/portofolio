<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio CRUD</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;padding:30px}.container{max-width:1100px;margin:auto}.card{background:rgba(255,255,255,.08);backdrop-filter:blur(12px);padding:20px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.25);margin-bottom:20px}h1{text-align:center}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:18px}.input,textarea{width:100%;padding:12px;border:none;border-radius:12px;margin:8px 0}.btn{padding:12px 16px;border:none;border-radius:12px;cursor:pointer;font-weight:bold}.primary{background:#38bdf8}.danger{background:#ef4444;color:#fff}.warn{background:#f59e0b}.item img{width:100%;height:180px;object-fit:cover;border-radius:14px}.actions{display:flex;gap:8px;margin-top:10px}
</style>
</head>
<body>
<div class='container'>
<h1>✨ Portfolio CRUD App</h1>
<div class='card'>
<input id='title' class='input' placeholder='Project Title'>
<textarea id='desc' class='input' placeholder='Description'></textarea>
<input id='image' class='input' type='file' accept='image/*'>
<button class='btn primary' onclick='saveItem()'>Save Project</button>
</div>
<div id='list' class='grid'></div>
</div>
<script>
let data=JSON.parse(localStorage.getItem('portfolio')||'[]');let editIndex=-1;
function render(){const list=document.getElementById('list');list.innerHTML='';data.forEach((item,i)=>{list.innerHTML+=`<div class='card item'><img src='${item.image}'><h3>${item.title}</h3><p>${item.desc}</p><div class='actions'><button class='btn warn' onclick='editItem(${i})'>Edit</button><button class='btn danger' onclick='deleteItem(${i})'>Delete</button></div></div>`}) ;localStorage.setItem('portfolio',JSON.stringify(data));}
function saveItem(){const t=title.value,d=desc.value,file=image.files[0];if(!t||!d)return alert('Isi semua data');if(file){const r=new FileReader();r.onload=e=>commit(t,d,e.target.result);r.readAsDataURL(file);}else{commit(t,d,data[editIndex]?.image||'');}}
function commit(t,d,img){const obj={title:t,desc:d,image:img};if(editIndex>-1){data[editIndex]=obj;editIndex=-1;}else data.push(obj);title.value='';desc.value='';image.value='';render();}
function editItem(i){editIndex=i;title.value=data[i].title;desc.value=data[i].desc;window.scrollTo({top:0,behavior:'smooth'});}
function deleteItem(i){if(confirm('Hapus project?')){data.splice(i,1);render();}}
render();
</script>
</body>
</html>
